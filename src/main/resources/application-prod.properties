# ============================================================================
# PRODUCTION APPLICATION CONFIGURATION
# ============================================================================
# This file is used when deploying to production (Render)
# To activate: export SPRING_PROFILES_ACTIVE=prod
# ============================================================================

# Application Name
spring.application.name=gymtracker

# ============================================================================
# DATABASE CONFIGURATION (Neon PostgreSQL)
# ============================================================================
# These values should be set via ENVIRONMENT VARIABLES in production
# Never hardcode database credentials in version control
#
# On Render, set these environment variables:
# - DATABASE_URL: postgresql://user:password@host/dbname?sslmode=require
# - Or set individual variables below

# Database URL - Construct JDBC URL from environment variable
# If DATABASE_URL is: postgresql://user:pass@host/db
# It becomes: jdbc:postgresql://user:pass@host/db
# 
# Note: Neon URLs typically look like:
# postgresql://user:pass@host-pooler.region.aws.neon.tech/db?sslmode=require&channel_binding=require
# Spring Boot will automatically prepend jdbc:postgresql:// if not present in newer versions
# But we explicitly set it here for clarity and compatibility
spring.datasource.url=jdbc:${DATABASE_URL}

# If that doesn't work, use this format instead (uncomment if needed):
# spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=require

# Username - typically read from DATABASE_URL, but can be overridden
# spring.datasource.username=${DB_USERNAME}

# Password - typically read from DATABASE_URL, but can be overridden
# spring.datasource.password=${DB_PASSWORD}

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================================
# JPA/HIBERNATE CONFIGURATION
# ============================================================================
# ddl-auto = validate: Only validate schema, don't modify
#   This is CRITICAL in production - prevents accidental data loss
# For production, schema changes use migrations (Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=validate

# Don't print SQL in production (performance + security)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Dialect for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL14Dialect

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
# Log level for production
logging.level.root=INFO
logging.level.com.gymtracker=INFO

# Don't log SQL parameters in production (security)
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ============================================================================
# SECURITY CONFIGURATION
# ============================================================================
# JWT Secret MUST be set via environment variable: JWT_SECRET
# The secret must be at least 32 characters for HS512 algorithm
jwt.secret=${JWT_SECRET}

# Token expiration times (in seconds)
jwt.access-token-expiry=900       # 15 minutes
jwt.refresh-token-expiry=2592000  # 30 days

# ============================================================================
# CORS CONFIGURATION
# ============================================================================
# In production, only allow requests from your frontend domain
# Set via environment variable: CORS_ALLOWED_ORIGINS
# Example: https://gymtracker.example.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ============================================================================
# HTTP CONFIGURATION
# ============================================================================
# Force HTTPS in production
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
# On Render, the port is automatically assigned via PORT environment variable
server.port=${PORT:8080}

# ============================================================================
# ACTUATOR CONFIGURATION (for monitoring)
# ============================================================================
# Expose health endpoint for Render health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
