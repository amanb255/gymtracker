# ============================================================================
# PRODUCTION APPLICATION CONFIGURATION
# ============================================================================
# This file is used when deploying to production (Render)
# To activate: export SPRING_PROFILES_ACTIVE=prod
# ============================================================================

# Application Name
spring.application.name=gymtracker

# ============================================================================
# DATABASE CONFIGURATION (Neon PostgreSQL)
# ============================================================================
# Neon provides: postgresql://user:password@host/db?sslmode=require
# JDBC format is different - we extract and configure separately

# JDBC URL: protocol://host/database?params (NO credentials in URL)
spring.datasource.url=jdbc:postgresql://ep-broad-salad-am4pnc92-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require

# Credentials from Neon (from your DATABASE_URL)
spring.datasource.username=neondb_owner
spring.datasource.password=${DB_PASSWORD}

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================================
# JPA/HIBERNATE CONFIGURATION
# ============================================================================
# ddl-auto = create: Create tables on startup (first deployment only)
# After first deployment, change to: validate
# For development, see application.properties
spring.jpa.hibernate.ddl-auto=create

# Don't print SQL in production (performance + security)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Dialect for PostgreSQL (Hibernate 6.x uses generic PostgresDialect)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
# Log level for production
logging.level.root=INFO
logging.level.com.gymtracker=INFO

# Don't log SQL parameters in production (security)
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ============================================================================
# SECURITY CONFIGURATION
# ============================================================================
# JWT Secret MUST be set via environment variable: JWT_SECRET
# The secret must be at least 32 characters for HS512 algorithm
jwt.secret=${JWT_SECRET}

# Token expiration times (in seconds)
jwt.access-token-expiry=900       # 15 minutes
jwt.refresh-token-expiry=2592000  # 30 days

# ============================================================================
# CORS CONFIGURATION
# ============================================================================
# In production, only allow requests from your frontend domain
# Set via environment variable: CORS_ALLOWED_ORIGINS
# Example: https://gymtracker.example.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ============================================================================
# HTTP CONFIGURATION
# ============================================================================
# Force HTTPS in production
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
# On Render, the port is automatically assigned via PORT environment variable
server.port=${PORT:8080}

# ============================================================================
# ACTUATOR CONFIGURATION (for monitoring)
# ============================================================================
# Expose health endpoint for Render health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
