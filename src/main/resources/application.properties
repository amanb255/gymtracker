# ============================================================================
# DEVELOPMENT APPLICATION CONFIGURATION
# ============================================================================
# This file is used for LOCAL development
# For production config, see: application-prod.properties
# ============================================================================

spring.application.name=gymtracker

# ============================================================================
# LOCAL DATABASE CONFIGURATION
# ============================================================================
# Connects to local PostgreSQL instance running on your machine
spring.datasource.url=jdbc:postgresql://localhost:5432/gymtracker
spring.datasource.username=gymuser
spring.datasource.password=devuka

# ============================================================================
# JPA/HIBERNATE CONFIGURATION
# ============================================================================
# ddl-auto = update: Automatically create/update tables from entities
# This is fine for development, but NEVER use in production
spring.jpa.hibernate.ddl-auto=update

# Enable SQL logging to see what queries are executed
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# JWT CONFIGURATION
# ============================================================================
# For development, use a simple secret (in production, use environment variable)
jwt.secret=dev-secret-key-min-32-characters-long-for-development-only-never-use-in-prod
jwt.access-token-expiry=900       # 15 minutes
jwt.refresh-token-expiry=2592000  # 30 days

# ============================================================================
# CORS CONFIGURATION
# ============================================================================
# Allow all origins in development (restrict in production)
cors.allowed-origins=*